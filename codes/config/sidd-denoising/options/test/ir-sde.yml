name: ir-sde-sidd
suffix: ~  # add suffix to saved images
model: denoising
distortion: sidd_denoising
gpu_ids: [0]

sde:
  max_sigma: 70
  T: 1000
  schedule: cosine
  eps: 0.005
  sampling_mode: posterior

datasets:
  test1:
    name: SIDD
    mode: LQGT
    dataroot_GT: /data1/jiangtaoren/datasets/SIDD/test/target
    dataroot_LQ: /data1/jiangtaoren/datasets/SIDD/test/input

#### network structures
network_G:
  which_model_G: ConditionalUNet
  setting:
    in_nc: 3
    out_nc: 3
    nf: 64
    depth: 4

#### path
path:
  pretrain_model_G: pretrained/ir-sde.pth
