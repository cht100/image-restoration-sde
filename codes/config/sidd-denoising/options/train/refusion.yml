#### general settings
name: refusion
use_tb_logger: true
model: denoising
distortion: sidd_denoising
gpu_ids: [0]

sde:
  max_sigma: 70  # 0.5
  T: 1000
  schedule: cosine # cosine # linear
  eps: 0.005
  
#### datasets
datasets:
  train:
    name: Train_Dataset
    mode: LQGT
    dataroot_GT: /data1/jiangtaoren/datasets/SIDD/train/target
    dataroot_LQ: /data1/jiangtaoren/datasets/SIDD/train/input

    use_shuffle: true
    n_workers: 4  # per GPU
    batch_size: 8
    GT_size: 256
    LR_size: 256
    use_flip: true
    use_rot: true
    color: RGB
  val:
    name: Val_Dataset
    mode: LQGT
    dataroot_GT: /data1/jiangtaoren/datasets/SIDD/test/target
    dataroot_LQ: /data1/jiangtaoren/datasets/SIDD/test/input

#### network structures
network_G:
  which_model_G: ConditionalNAFNet
  setting:
    width: 64
    enc_blk_nums: [1, 1, 1, 28]
    middle_blk_num: 1
    dec_blk_nums: [1, 1, 1, 1]

#### path
path:
  pretrain_model_G: ~
  strict_load: true
  resume_state: ~

#### training settings: learning rate scheme, loss
train:
  optimizer: Lion # Adam, AdamW, Lion
  lr_G: !!float 3e-5
  lr_scheme: TrueCosineAnnealingLR
  beta1: 0.9
  beta2: 0.99
  niter: 700000
  warmup_iter: -1  # no warm up
  lr_steps: [200000, 400000, 600000]
  lr_gamma: 0.5
  eta_min: !!float 1e-6

  # criterion
  is_weighted: False
  loss_type: l1
  weight: 1.0

  manual_seed: 0
  val_freq: !!float 1e4

#### logger
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 1e4
